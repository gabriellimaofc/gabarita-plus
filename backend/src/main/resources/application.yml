spring:
  application:
    name: gabaritaplus-api
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/gabaritaplus}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
        default_batch_fetch_size: 50
  flyway:
    enabled: true
    baseline-on-migrate: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2s

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
  jwt:
    secret: ${JWT_SECRET:change-me-change-me-change-me-change-me-change-me}
    access-token-expiration-minutes: ${JWT_ACCESS_EXPIRATION_MINUTES:60}
    refresh-token-expiration-days: ${JWT_REFRESH_EXPIRATION_DAYS:15}
  rate-limit:
    enabled: ${RATE_LIMIT_ENABLED:true}
    requests-per-minute: ${RATE_LIMIT_REQUESTS_PER_MINUTE:120}
  redis:
    enabled: ${REDIS_ENABLED:false}

logging:
  level:
    root: INFO
    com.gabaritaplus.api: INFO
    org.springframework.security: INFO
