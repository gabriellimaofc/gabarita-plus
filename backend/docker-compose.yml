version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: gabaritaplus-postgres
    environment:
      POSTGRES_DB: gabaritaplus
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gabaritaplus"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: gabaritaplus-redis
    ports:
      - "6379:6379"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gabaritaplus-api
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/gabaritaplus
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: change-me-change-me-change-me-change-me-change-me
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_ENABLED: "false"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  postgres_data:
